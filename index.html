/* ===== 工具函数 ===== */
function getStore(key,defaultVal){
    try{var v=localStorage.getItem(key);return v?JSON.parse(v):defaultVal;}catch(e){return defaultVal;}
}
function setStore(key,val){localStorage.setItem(key,JSON.stringify(val));}

/* ===== 工具函数 ===== */
function esc(s){if(!s)return'';return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function getPlaceholderSVG(title){
var t=(title||'作品图片').replace(/[&<>"]/g,'');
var svg='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300"><rect width="400" height="300" fill="#131313"/><text x="200" y="150" text-anchor="middle" fill="#6b727c" font-size="14" font-family="sans-serif">'+t+'</text></svg>';
try{return 'data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(svg)));}catch(e){return '';}
}

var count=0;
worksData.forEach(function(w){if(w.category===cat.name)count++;});
var bgHtml='<img src="'+cat.cover+'" alt="'+esc(cat.name)+'" style="width:100%;height:100%;object-fit:cover;opacity:0.55;" onerror="this.style.display=\'none\'">';
html+='<div class="category-card" data-category="'+cat.name+'">'
    +'<div class="category-bg">'+bgHtml+'</div>'
    +'<div class="category-overlay"><div class="category-name">'+cat.name+'</div><div class="category-count">'+count+' 个作品</div></div>'
    +'<div class="category-arrow">→</div></div>';
});
container.innerHTML=html;
container.querySelectorAll('.category-card').forEach(function(card){
card.addEventListener('click',function(){openGallery(card.dataset.category);});
});
}

/* ===== 画廊 ===== */
var currentCategory='';
var currentGalleryItems=[];
var lightboxIndex=0;

function openGallery(category){
currentCategory=category;
document.getElementById('galleryTitle').textContent=category;
currentGalleryItems=[];
worksData.forEach(function(w){if(w.category===category)currentGalleryItems.push(w);});
document.getElementById('galleryCount').textContent=currentGalleryItems.length+' 个作品';
renderMasonry();
document.getElementById('mainPage').style.display='none';
document.getElementById('galleryPage').classList.add('active');
window.scrollTo(0,0);
}
function closeGallery(){
document.getElementById('galleryPage').classList.remove('active');
document.getElementById('mainPage').style.display='block';
document.getElementById('lightbox').classList.remove('active');
}
function renderMasonry(){
var grid=document.getElementById('masonryGrid');
if(!grid)return;
if(currentGalleryItems.length===0){grid.innerHTML='<div class="empty-gallery"><p>暂无'+currentCategory+'相关作品</p></div>';return;}
var html='';
currentGalleryItems.forEach(function(work,i){
var img=work.imageData||getPlaceholderSVG(work.title);
html+='<div class="masonry-item" data-index="'+i+'">'+'<img src="'+esc(img)+'" alt="'+esc(work.title)+'" onerror="this.src=\''+getPlaceholderSVG(work.title)+'\'">'+'<div class="masonry-info"><div class="masonry-title">'+esc(work.title)+'</div>'+(work.desc?'<div class="masonry-desc">'+esc(work.desc)+'</div>':'')+'</div></div>';
});
grid.innerHTML=html;
grid.querySelectorAll('.masonry-item').forEach(function(item){
item.addEventListener('click',function(){lightboxIndex=parseInt(this.dataset.index);openLightbox();});
});
}
function openLightbox(){
if(!currentGalleryItems.length)return;
var w=currentGalleryItems[lightboxIndex];
var imgEl=document.getElementById('lightboxImg');
imgEl.src='';
setTimeout(function(){imgEl.src=w.imageData||'';},10);
document.querySelector('#lightboxInfo h3').textContent=w.title||'';
document.querySelector('#lightboxInfo p').textContent=w.desc||'';
document.getElementById('lightbox').classList.add('active');
}
function closeLightbox(){
document.getElementById('lightbox').classList.remove('active');
document.getElementById('lightboxImg').src='';
}
function prevImage(){lightboxIndex=(lightboxIndex-1+currentGalleryItems.length)%currentGalleryItems.length;openLightbox();}
function nextImage(){lightboxIndex=(lightboxIndex+1)%currentGalleryItems.length;openLightbox();}

document.getElementById('lightboxClose').addEventListener('click',closeLightbox);
document.getElementById('lightboxPrev').addEventListener('click',prevImage);
document.getElementById('lightboxNext').addEventListener('click',nextImage);
document.getElementById('galleryBack').addEventListener('click',closeGallery);
document.addEventListener('keydown',function(e){
if(!document.getElementById('lightbox').classList.contains('active'))return;
if(e.key==='Escape')closeLightbox();
if(e.key==='ArrowLeft')prevImage();
if(e.key==='ArrowRight')nextImage();
});
document.getElementById('lightbox').addEventListener('click',function(e){
if(e.target===this)closeLightbox();
});

/* ===== 工作历程折叠 ===== */
var journeyHeader=document.getElementById('journeyHeader');
var journeyContent=document.getElementById('journeyContent');
var toggleIcon=journeyHeader?journeyHeader.querySelector('.toggle-icon'):null;
if(journeyHeader&&journeyContent){
journeyHeader.addEventListener('click',function(){
var isCollapsed=journeyHeader.classList.contains('collapsed');
if(isCollapsed){
journeyContent.style.display='block';
journeyHeader.classList.remove('collapsed');
if(toggleIcon)toggleIcon.textContent='▲';
if(!document.getElementById('timelineContainer').innerHTML)renderTimeline();
}else{
journeyContent.style.display='none';
journeyHeader.classList.add('collapsed');
if(toggleIcon)toggleIcon.textContent='▼';
}
});
}

/* ===== 设计日志 ===== */
function loadJournalData(){
try{
var stored=localStorage.getItem(JOURNAL_KEY);
if(stored)return JSON.parse(stored);
}catch(e){}
return getDefaultJournal();
}
function getDefaultJournal(){return[
{id:'journal1',category:'设计思考',title:'极简主义版式新思考',date:'2025.01.15',content:'<p>在最近的企业画册设计中，我重新审视了极简主义在版式设计中的应用。</p>'},
{id:'journal2',category:'技术探索',title:'C4D动态视觉趋势',date:'2024.12.20',content:'<p>今年下半年开始，我系统地学习了Cinema 4D和OC渲染器。</p>'}
];}

var journalData=loadJournalData();
var journalArticles={};

function renderJournalList(){
journalArticles={};
var container=document.getElementById('journalGrid');
if(!container)return;
if(!journalData.length){container.innerHTML='<div style="color:#6b727c;grid-column:1/-1;text-align:center;padding:2rem;">暂无日志文章</div>';return;}
var html='';
journalData.forEach(function(item){
journalArticles[item.id]=item;
html+='<div class="journal-card" data-id="'+item.id+'">'+'<h4>'+esc(item.title)+'</h4>'+'<div class="journal-date">'+esc(item.date)+'</div>'+'<p>'+(item.content?item.content.replace(/<[^>]+>/g,'').substring(0,60)+'...':'')+'</p>'+'</div>';
});
container.innerHTML=html;
container.querySelectorAll('.journal-card').forEach(function(card){
card.addEventListener('click',function(){openJournalArticle(card.dataset.id);});
});
}

function openJournalArticle(id){
var article=journalArticles[id];
if(!article)return;
document.getElementById('articleCategory').textContent=article.category||'';
document.getElementById('articleTitle').textContent=article.title||'';
document.getElementById('journalDate').textContent=article.date||'';
document.getElementById('articleContent').innerHTML=article.content||'';
document.getElementById('mainPage').style.display='none';
document.getElementById('journalPage').classList.add('active');
window.scrollTo(0,0);
}
function closeJournalArticle(){
document.getElementById('journalPage').classList.remove('active');
document.getElementById('mainPage').style.display='block';
window.scrollTo(0,0);
}
document.getElementById('journalBack').addEventListener('click',closeJournalArticle);
