</style>

<script>
/* ===== 配置 ===== */
const CATEGORIES = [
{ id:'brand', name:'品牌视觉', imageKey:'cat_brand', color:'#1e6fd9' },
{ id:'ui', name:'UI/UX设计', imageKey:'cat_ui', color:'#10b981' },
{ id:'print', name:'平面印刷', imageKey:'cat_print', color:'#f59e0b' },
{ id:'operation', name:'运营设计', imageKey:'cat_operation', color:'#ec4899' },
{ id:'ppt', name:'PPT视觉', imageKey:'cat_ppt', color:'#8b5cf6' },
{ id:'other', name:'其他设计', imageKey:'cat_other', color:'#6b7280' }
];
const WORKS_KEY = "zgj_portfolio_works_v2";
const BANNER_KEY = "zgj_banner_image";
const ABOUT_KEY = "zgj_about_data_v2";
const CAREER_KEY = "zgj_career_timeline";
const JOURNAL_KEY = "zgj_portfolio_journal_v2";
const CONTACT_KEY = "zgj_contact_data_v2";

/* ===== IndexedDB 存储层（与 admin.html 共用）===== */
var DB_NAME='PortfolioDB',DB_VER=1,_db=null;
function openDB(callback){
    if(_db){callback(_db);return;}
    var req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=function(e){var db=e.target.result;
        if(!db.objectStoreNames.contains('files'))db.createObjectStore('files',{keyPath:'id'});
        if(!db.objectStoreNames.contains('data'))db.createObjectStore('data',{keyPath:'id'});
    };
    req.onsuccess=function(e){_db=e.target.result;callback(_db);};
    req.onerror=function(){console.error('IndexedDB 打开失败');callback(null);};
}
function dbGet(store,key,callback){
    openDB(function(db){
        if(!db){callback(null);return;}
        var tx=db.transaction(store,'readonly'),s=tx.objectStore(store);
        var req=s.get(key);
        req.onsuccess=function(e){callback(e.target.result?e.target.result.value:null);};
        req.onerror=function(){callback(null);};
    });
}
function dbSet(store,key,value,callback){
    openDB(function(db){
        if(!db){if(callback)callback(false);return;}
        var tx=db.transaction(store,'readwrite'),s=tx.objectStore(store);
        var req=s.put({id:key,value:value});
        req.onsuccess=function(){if(callback)callback(true);};
        req.onerror=function(){if(callback)callback(false);};
    });
}
function dbRemove(store,key,callback){
    openDB(function(db){
        if(!db){if(callback)callback(false);return;}
        var tx=db.transaction(store,'readwrite'),s=tx.objectStore(store);
        var req=s.delete(key);
        req.onsuccess=function(){if(callback)callback(true);};
        req.onerror=function(){if(callback)callback(false);};
    });
}
function getStore(key,defaultVal){
    try{var v=localStorage.getItem(key);return v?JSON.parse(v):defaultVal;}catch(e){return defaultVal;}
}
function setStore(key,val){localStorage.setItem(key,JSON.stringify(val));}

/* ===== 工具函数 ===== */
function esc(s){if(!s)return'';return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function getPlaceholderSVG(title){
var t=(title||'作品图片').replace(/[&<>"]/g,'');
var svg='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300"><rect width="400" height="300" fill="#131313"/><text x="200" y="150" text-anchor="middle" fill="#6b727c" font-size="14" font-family="sans-serif">'+t+'</text></svg>';
try{return 'data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(svg)));}catch(e){return '';}
}

/* ===== 数据加载 ===== */
var categoryImages={};  // 存储分类图片数据

function loadCategoryImages(callback){
    var loaded=0;
    CATEGORIES.forEach(function(cat){
        dbGet('data',cat.imageKey,function(val){
            if(val)categoryImages[cat.id]=val;
            loaded++;
            if(loaded===CATEGORIES.length && callback)callback();
        });
    });
}
function loadBanner(){
try{
var stored=localStorage.getItem(BANNER_KEY);
if(stored&&stored.startsWith('data:image')){
document.getElementById('bannerInner').style.backgroundImage='url('+stored+')';
document.getElementById('bannerInner').style.backgroundSize='cover';
}
}catch(e){}
try{
var d=JSON.parse(localStorage.getItem('zgj_banner_text')||'{}');
if(d.title)document.getElementById('bannerTitle').textContent=d.title;
if(d.subtitle)document.getElementById('bannerSubtitle').textContent=d.subtitle;
}catch(e){}
}

function loadAbout(){
var defaultText1='祝光军，资深平面设计师，17年设计行业深耕经验，曾服务于物联科技、品牌策划、数码商业及印刷领域。具备全案设计思维与项目落地能力，擅长品牌VI、UI界面、新媒体视觉、三维渲染与视频剪辑。';
var defaultText2='拥抱新技术与AI工具，独立完成从创意企划到印刷/上线执行。相信极简主义能传递更深层的品牌力量。';
var defaultText3='厦门 | 全案视觉 | 设计管理';
var defaultSkills=['PS / AI','XD / Figma','AE / C4D','品牌VI','UI/UX','印刷工艺','视频剪辑','3D渲染','创意策划'];
var d={},skills=defaultSkills;
try{d=JSON.parse(localStorage.getItem(ABOUT_KEY)||'{}');}catch(e){}
document.getElementById('aboutText').innerHTML=
'<p>'+esc(d.text1||defaultText1)+'</p>'+
'<p>'+esc(d.text2||defaultText2)+'</p>'+
'<p style="margin-top:0.8rem;">'+esc(d.text3||defaultText3)+'</p>';
skills=d.skills&&d.skills.length?d.skills:defaultSkills;
var tagsHtml='';
skills.forEach(function(s){tagsHtml+='<span>'+esc(s)+'</span>';});
document.getElementById('skillsTags').innerHTML=tagsHtml;
}

function renderCategories(){

/* ===== 画廊 ===== */
var currentCategory='';
var currentGalleryItems=[];
var lightboxIndex=0;

function openGallery(category){
currentCategory=category;
document.getElementById('galleryTitle').textContent=category;
currentGalleryItems=[];
worksData.forEach(function(w){if(w.category===category)currentGalleryItems.push(w);});
document.getElementById('galleryCount').textContent=currentGalleryItems.length+' 个作品';
renderMasonry();
document.getElementById('mainPage').style.display='none';
document.getElementById('galleryPage').classList.add('active');
window.scrollTo(0,0);
}
function closeGallery(){
document.getElementById('galleryPage').classList.remove('active');
document.getElementById('mainPage').style.display='block';
document.getElementById('lightbox').classList.remove('active');
}
function renderMasonry(){
var grid=document.getElementById('masonryGrid');
if(!grid)return;
if(currentGalleryItems.length===0){grid.innerHTML='<div class="empty-gallery"><p>暂无'+currentCategory+'相关作品</p></div>';return;}
var html='';
currentGalleryItems.forEach(function(work,i){
var img=work.imageData||getPlaceholderSVG(work.title);
html+='<div class="masonry-item" data-index="'+i+'">'+'<img src="'+esc(img)+'" alt="'+esc(work.title)+'" onerror="this.src=\''+getPlaceholderSVG(work.title)+'\'">'+'<div class="masonry-info"><div class="masonry-title">'+esc(work.title)+'</div>'+(work.desc?'<div class="masonry-desc">'+esc(work.desc)+'</div>':'')+'</div></div>';
});
grid.innerHTML=html;
grid.querySelectorAll('.masonry-item').forEach(function(item){
item.addEventListener('click',function(){lightboxIndex=parseInt(this.dataset.index);openLightbox();});
});
}
function openLightbox(){
if(!currentGalleryItems.length)return;
var w=currentGalleryItems[lightboxIndex];
var imgEl=document.getElementById('lightboxImg');
imgEl.src='';
setTimeout(function(){imgEl.src=w.imageData||'';},10);
document.querySelector('#lightboxInfo h3').textContent=w.title||'';
document.querySelector('#lightboxInfo p').textContent=w.desc||'';
document.getElementById('lightbox').classList.add('active');
}
function closeLightbox(){
document.getElementById('lightbox').classList.remove('active');
document.getElementById('lightboxImg').src='';
}
function prevImage(){lightboxIndex=(lightboxIndex-1+currentGalleryItems.length)%currentGalleryItems.length;openLightbox();}
function nextImage(){lightboxIndex=(lightboxIndex+1)%currentGalleryItems.length;openLightbox();}

document.getElementById('lightboxClose').addEventListener('click',closeLightbox);
document.getElementById('lightboxPrev').addEventListener('click',prevImage);
document.getElementById('lightboxNext').addEventListener('click',nextImage);
document.getElementById('galleryBack').addEventListener('click',closeGallery);
document.addEventListener('keydown',function(e){
if(!document.getElementById('lightbox').classList.contains('active'))return;
if(e.key==='Escape')closeLightbox();
if(e.key==='ArrowLeft')prevImage();
if(e.key==='ArrowRight')nextImage();
});
document.getElementById('lightbox').addEventListener('click',function(e){
if(e.target===this)closeLightbox();
});

var journalData=loadJournalData();
var journalArticles={};

function renderJournalList(){
journalArticles={};
var container=document.getElementById('journalGrid');
if(!container)return;
if(!journalData.length){container.innerHTML='<div style="color:#6b727c;grid-column:1/-1;text-align:center;padding:2rem;">暂无日志文章</div>';return;}
var html='';
journalData.forEach(function(item){
journalArticles[item.id]=item;
html+='<div class="journal-card" data-id="'+item.id+'">'+'<h4>'+esc(item.title)+'</h4>'+'<div class="journal-date">'+esc(item.date)+'</div>'+'<p>'+(item.content?item.content.replace(/<[^>]+>/g,'').substring(0,60)+'...':'')+'</p>'+'</div>';
});
container.innerHTML=html;
container.querySelectorAll('.journal-card').forEach(function(card){
card.addEventListener('click',function(){openJournalArticle(card.dataset.id);});
});
}

function openJournalArticle(id){
var article=journalArticles[id];
if(!article)return;
document.getElementById('articleCategory').textContent=article.category||'';
document.getElementById('articleTitle').textContent=article.title||'';
document.getElementById('journalDate').textContent=article.date||'';
document.getElementById('articleContent').innerHTML=article.content||'';
document.getElementById('mainPage').style.display='none';
document.getElementById('journalPage').classList.add('active');
window.scrollTo(0,0);
}
function closeJournalArticle(){
document.getElementById('journalPage').classList.remove('active');
document.getElementById('mainPage').style.display='block';
window.scrollTo(0,0);
}
document.getElementById('journalBack').addEventListener('click',closeJournalArticle);

/* ===== 下载简历（优先从 IndexedDB 读取）===== */
document.getElementById('downloadResumeBtn').addEventListener('click',function(){
    var resumeFilename=localStorage.getItem('zgj_resume_filename')||'祝光军_简历.pdf';
    /* 优先检查：外部文件名（需要文件放在 portfolio 文件夹）*/
    if(resumeFilename&&resumeFilename.indexOf('.')>0&&resumeFilename!=='祝光军_简历.pdf'){
        var a=document.createElement('a');
        a.href=resumeFilename;
        a.download=resumeFilename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        return;
    }
    /* 其次检查：IndexedDB 中的简历文件 */
    dbGet('files','zgj_resume_file',function(val){
        if(val&&val.data){
            var a=document.createElement('a');
            a.href=val.data;
            a.download=val.name||resumeFilename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            return;
        }
        /* 回退：生成文本简历 */
        var contactD=JSON.parse(localStorage.getItem(CONTACT_KEY)||'{}');
        var email=contactD.email||'872408005@qq.com';
        var phone=contactD.phone||'18605022848';
        var location=contactD.location||'中国 · 厦门';
        var career=loadCareerData();
        var content='祝光军 简历\n==================\n邮箱：'+email+'\n电话：'+phone+'\n地址：'+location+'\n\n【工作经历】\n'+career.map(function(e){return e.period+'\n'+e.company+' | '+e.role+'\n'+e.desc;}).join('\n\n')+'\n';
        var blob=new Blob([content],{type:'text/plain;charset=utf-8'});
        var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='祝光军_简历.txt';
        document.body.appendChild(a);a.click();document.body.removeChild(a);
    });
});
